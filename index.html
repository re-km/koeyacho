<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>koeyacho v3.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <style>
        :root {
            --bg-color: #f3f3f3;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --accent-color: #007acc;
            --success-color: #16825d;
            --warning-color: #ea5c00;
            --error-color: #d13438;
            --sub-text: #666666;
            --shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 1.2em;
            color: var(--text-color);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }

        .select-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        select,
        input[type="number"],
        input[type="text"] {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: #fff;
            font-size: 1em;
            width: 100%;
        }

        .flex-grow {
            flex: 1;
        }

        button {
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
            padding: 8px 16px;
            font-weight: 600;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-outline {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            font-size: 1.1em;
        }

        .btn-danger {
            background: #fff;
            border: 1px solid var(--error-color);
            color: var(--error-color);
            padding: 4px 8px;
        }

        .mic-btn {
            width: 100%;
            padding: 25px;
            background: var(--accent-color);
            color: white;
            font-size: 1.4em;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 122, 204, 0.2);
            margin-bottom: 10px;
        }

        .mic-btn.listening {
            background: var(--error-color);
            box-shadow: 0 0 15px rgba(209, 52, 56, 0.4);
        }

        .result-box {
            text-align: center;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            border: 1px dashed #ccc;
        }

        .recognized-text {
            font-size: 1.1em;
            font-weight: bold;
            color: var(--accent-color);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        th,
        td {
            padding: 10px 5px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        .status-ok {
            color: var(--success-color);
            font-size: 0.8em;
        }

        .status-wait {
            color: var(--warning-color);
            font-size: 0.8em;
        }

        .raw-text-display {
            font-weight: 500;
        }

        .edit-input {
            width: 100%;
            padding: 6px;
            font-size: 0.95em;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
        }

        .footer {
            text-align: center;
            color: var(--sub-text);
            font-size: 0.75em;
            margin-top: 20px;
        }

        .sheet-badge {
            background: #e1f0fa;
            color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
            display: inline-block;
        }

        .sync-alert {
            background: #fff4e5;
            border: 1px solid var(--warning-color);
            color: #663c00;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <h1>koeyacho v3.0</h1>

    <div id="syncAlert" class="sync-alert">
        <span>⚠️ 未送信データ: <strong id="unsentCount">0</strong>件</span>
        <button class="btn-outline" style="background:var(--warning-color); color:white; border:none;"
            onclick="syncAllData()">再送信</button>
    </div>

    <!-- 橋・場所選択 -->
    <div class="card">
        <div class="select-row">
            <select id="bridgeSelect" class="flex-grow">
                <option value="">（読込中...）</option>
            </select>
        </div>
        <div class="select-row">
            <select id="partSelect" class="flex-grow">
                <option value="下面">下面</option>
                <option value="下部工">下部工</option>
                <option value="支承部">支承部</option>
                <option value="橋面">橋面</option>
                <option value="トラス・アーチ">トラス・アーチ</option>
            </select>
            <input type="number" id="spanInput" placeholder="径間" style="width: 80px;">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <button id="openSheetBtn" class="btn-outline" style="font-size:0.85em; display:none;"
                onclick="openCurrentSpreadsheet()">🔗 シートを開く</button>
            <div style="text-align:right; flex-grow:1;">
                <span class="sheet-badge">入力先: <span id="currentSheetName">下面</span></span>
            </div>
        </div>
    </div>

    <!-- 音声入力 -->
    <div class="card" style="border-left: 4px solid var(--accent-color);">
        <button id="micBtn" class="mic-btn">🎙️ 音声入力</button>

        <div class="result-box">
            <div style="font-size:0.8em; color:var(--sub-text); margin-bottom:5px;">認識結果</div>
            <div id="recognizedText" class="recognized-text">待機中...</div>
        </div>

        <button id="addBtn" class="btn-success" style="display:none;">✓ 記録する</button>
    </div>

    <!-- 入力履歴 -->
    <div class="card">
        <div class="list-header">
            <span style="font-weight:600;">入力履歴 (<span id="dataCount">0</span>件)</span>
            <div>
                <button class="btn-outline" style="font-size:0.8em; padding:4px 8px;"
                    onclick="fetchBridgeList()">🔃リスト更新</button>
                <button class="btn-outline" style="font-size:0.8em; padding:4px 8px; color:var(--error-color);"
                    onclick="clearAllData()">全消去</button>
            </div>
        </div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table>
                <tbody id="dataBody"></tbody>
            </table>
            <div id="emptyState" style="text-align:center; padding:20px; color:var(--sub-text);">履歴はありません</div>
        </div>
    </div>

    <div class="footer">v3.0.0 (Gemini AI Powered)</div>

    <script>
        // ==========================================
        // 設定エリア (ハードコードによる永続化)
        // ==========================================
        // 【重要】GASをデプロイしたWeb App URLをここに直接記述してください。
        // これにより、iPhone側でキャッシュが飛んでもURL設定が消滅しません。
        const HARDCODED_GAS_URL = "ここにGASのURLを貼り付けます";

        let config = {
            gasUrl: localStorage.getItem('gasUrl') || HARDCODED_GAS_URL,
            bridges: JSON.parse(localStorage.getItem('bridges') || '[]'),
            currentBridgeId: localStorage.getItem('currentBridgeId') || '',
            currentPart: localStorage.getItem('currentPart') || '下面',
            currentSpan: localStorage.getItem('currentSpan') || ''
        };

        let appState = {
            data: [], // 送信履歴配列
            currentRawText: "" // 現在マイクで拾ったテキスト
        };

        // ==========================================
        // 初期化処理
        // ==========================================
        window.onload = () => {
            // もしハードコードURLが設定されていて、LocalStorageと異なるなら更新
            if (HARDCODED_GAS_URL && HARDCODED_GAS_URL !== "ここにGASのURLを貼り付けます" && config.gasUrl !== HARDCODED_GAS_URL) {
                config.gasUrl = HARDCODED_GAS_URL;
                localStorage.setItem('gasUrl', config.gasUrl);
            }

            loadData();

            document.getElementById('partSelect').value = config.currentPart;
            document.getElementById('spanInput').value = config.currentSpan;
            updateSheetLabel();

            renderBridgeSelect();
            updateUI();

            if (config.gasUrl && config.gasUrl !== "ここにGASのURLを貼り付けます") {
                fetchBridgeList();
            } else {
                alert("HTML内の HARDCODED_GAS_URL にスクリプトURLを設定してください。");
            }
        };

        // ==========================================
        // UI操作 / 状態管理
        // ==========================================
        function getCurrentSheetName() {
            const part = document.getElementById('partSelect').value;
            const span = document.getElementById('spanInput').value;
            return span ? part + span : part;
        }

        document.getElementById('partSelect').addEventListener('change', (e) => {
            config.currentPart = e.target.value; localStorage.setItem('currentPart', config.currentPart); updateSheetLabel();
        });
        document.getElementById('spanInput').addEventListener('input', (e) => {
            config.currentSpan = e.target.value; localStorage.setItem('currentSpan', config.currentSpan); updateSheetLabel();
        });

        function updateSheetLabel() {
            document.getElementById('currentSheetName').textContent = getCurrentSheetName();
        }

        function getBridgeInfo(id) {
            return config.bridges.find(x => x.id === id);
        }

        document.getElementById('bridgeSelect').addEventListener('change', (e) => {
            config.currentBridgeId = e.target.value;
            localStorage.setItem('currentBridgeId', config.currentBridgeId);
            updateSheetLinkBtn();
        });

        function updateSheetLinkBtn() {
            const btn = document.getElementById('openSheetBtn');
            const info = getBridgeInfo(config.currentBridgeId);
            if (info && info.url) {
                btn.style.display = 'inline-block';
                btn.onclick = () => window.open(info.url, '_blank');
            } else {
                btn.style.display = 'none';
            }
        }

        function loadData() {
            const json = localStorage.getItem('inspectionData');
            if (json) appState.data = JSON.parse(json);
        }

        function saveData() {
            localStorage.setItem('inspectionData', JSON.stringify(appState.data));
            updateUI();
        }

        // ==========================================
        // 音声認識処理 (生テキスト取得のみ)
        // ==========================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const micBtn = document.getElementById('micBtn');
        const recText = document.getElementById('recognizedText');
        const addBtn = document.getElementById('addBtn');

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';

            micBtn.addEventListener('click', () => {
                recognition.start();
                micBtn.classList.add('listening');
                micBtn.textContent = '聞いています...';
                recText.textContent = '...';
                addBtn.style.display = 'none';
                appState.currentRawText = "";
            });

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                appState.currentRawText = text;
                recText.textContent = text;
                micBtn.classList.remove('listening');
                micBtn.textContent = '🎙️ 音声入力';
                addBtn.style.display = 'block';
            };

            recognition.onerror = () => {
                micBtn.classList.remove('listening');
                micBtn.textContent = '🎙️ 音声入力';
                recText.textContent = 'エラーが発生しました。もう一度お試しください。';
            };
        } else {
            micBtn.disabled = true;
            micBtn.textContent = 'このブラウザは音声入力非対応です';
        }

        // ==========================================
        // データ記録・送信処理
        // ==========================================
        addBtn.addEventListener('click', () => {
            if (!appState.currentRawText) return;

            const bInfo = getBridgeInfo(config.currentBridgeId);
            if (!bInfo) {
                alert("入力先の橋を選択してください。"); // 安全装置
                return;
            }

            const record = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('ja-JP'),
                bridgeId: config.currentBridgeId,
                bridgeName: bInfo.name,
                sheetName: getCurrentSheetName(),
                rawText: appState.currentRawText, // 生テキストのみ持つ
                synced: false
            };

            appState.data.unshift(record); // 最新を上に追加
            saveData();

            addBtn.style.display = 'none';
            recText.innerHTML = '<span style="color:var(--success-color)">✓ 送信準備完了</span>';
            setTimeout(() => { recText.textContent = '待機中...'; }, 1500);

            if (navigator.onLine && config.gasUrl) {
                sendToCloud(record);
            }
        });

        async function fetchBridgeList() {
            if (!config.gasUrl || config.gasUrl === "ここにGASのURLを貼り付けます") return;
            const select = document.getElementById('bridgeSelect');
            select.options[0].textContent = "通信中...";

            try {
                const res = await fetch(config.gasUrl + '?action=list');
                const json = await res.json();

                if (json.status === 'success') {
                    config.bridges = json.bridges;
                    localStorage.setItem('bridges', JSON.stringify(config.bridges));
                    renderBridgeSelect();
                } else {
                    select.options[0].textContent = "GASエラー";
                }
            } catch (e) {
                console.error(e);
                select.options[0].textContent = "オフライン";
            }
        }

        function renderBridgeSelect() {
            const select = document.getElementById('bridgeSelect');
            select.innerHTML = '<option value="">橋を選択してください</option>';
            config.bridges.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id;
                opt.textContent = b.name;
                select.appendChild(opt);
            });
            if (config.currentBridgeId) {
                select.value = config.currentBridgeId;
                updateSheetLinkBtn();
            }
        }

        async function sendToCloud(record) {
            try {
                const payload = {
                    fileId: record.bridgeId,
                    sheetName: record.sheetName,
                    rawText: record.rawText,
                    timestamp: record.timestamp
                };

                const res = await fetch(config.gasUrl, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });

                // Gemini APIの呼び出し時間によりレスポンスが遅延する可能性がある
                const json = await res.json();

                if (json.success) {
                    record.synced = true;
                    // GASから採番されたNoが返ってくれば保存しておいても良い
                    if (json.assignedNo) record.assignedNo = json.assignedNo;
                    saveData();
                    return { success: true };
                } else {
                    throw new Error(json.error || "Unknown Error");
                }
            } catch (e) {
                console.error("送信失敗", e);
                return { success: false, msg: e.message };
            }
        }

        async function syncAllData() {
            const unsent = appState.data.filter(d => !d.synced);
            for (const record of unsent) {
                await sendToCloud(record);
                await new Promise(r => setTimeout(r, 1000)); // Gemini API制限回避のため長めに
            }
            updateUI();
        }

        // ==========================================
        // リスト表示と編集操作
        // ==========================================
        function updateUI() {
            const tbody = document.getElementById('dataBody');
            const empty = document.getElementById('emptyState');
            const syncAlert = document.getElementById('syncAlert');

            tbody.innerHTML = '';

            if (appState.data.length === 0) {
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';

                // 表示用件数 (配列は逆順(新しい順)になっているが、Noとしては古いものが若い番号)
                // 採番用に、一番古いレコードをNo.1とみなして配列長で逆算表示する
                const total = appState.data.length;

                appState.data.forEach((d, idx) => {
                    const tr = document.createElement('tr');
                    const statusIcon = d.synced ? '<span class="status-ok">☁️送信済</span>' : '<span class="status-wait">⚠️未送信</span>';
                    // 記録順の仮想No
                    const displayNo = total - idx;

                    // シート名表示（省略されがちなので）
                    const tgtStr = `<span style="font-size:0.8em; color:#888;">[${d.sheetName}]</span>`;

                    tr.innerHTML = `
                        <td style="width:25px; vertical-align:top; color:#999; font-size:0.8em;">${displayNo}</td>
                        <td style="vertical-align:top;">
                            <div id="text-display-${d.id}" class="raw-text-display">${d.rawText}</div>
                            <div id="edit-box-${d.id}" style="display:none; margin-top:5px;">
                                <input type="text" id="edit-input-${d.id}" class="edit-input" value="${d.rawText}">
                                <div style="margin-top:5px; text-align:right;">
                                    <button class="btn-outline" style="padding:2px 8px; font-size:0.8em;" onclick="cancelEdit(${d.id})">戻る</button>
                                    <button class="btn-outline" style="background:var(--accent-color); color:white; padding:2px 8px; font-size:0.8em;" onclick="saveEdit(${d.id})">変更&再送</button>
                                </div>
                            </div>
                            <div style="margin-top:4px;">${statusIcon} ${tgtStr}</div>
                        </td>
                        <td style="width:50px; text-align:right; vertical-align:top;">
                            <button class="btn-outline" style="font-size:0.75em; padding:3px 6px; margin-bottom:5px;" onclick="startEdit(${d.id})">✎</button>
                            <br>
                            <button class="btn-danger" style="font-size:0.75em; padding:3px 6px;" onclick="deleteRecord(${d.id})">×</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            const unsent = appState.data.filter(d => !d.synced).length;
            if (unsent > 0) {
                syncAlert.style.display = 'flex';
                document.getElementById('unsentCount').textContent = unsent;
            } else {
                syncAlert.style.display = 'none';
            }

            document.getElementById('dataCount').textContent = appState.data.length;
        }

        function clearAllData() {
            if (confirm("端末内の送信履歴をすべて消去しますか？（スプレッドシートのデータは消えません）")) {
                appState.data = [];
                saveData();
            }
        }

        function deleteRecord(id) {
            if (confirm("この履歴を削除しますか？")) {
                appState.data = appState.data.filter(d => d.id !== id);
                saveData();
            }
        }

        function startEdit(id) {
            document.getElementById(`text-display-${id}`).style.display = 'none';
            document.getElementById(`edit-box-${id}`).style.display = 'block';
        }

        function cancelEdit(id) {
            document.getElementById(`text-display-${id}`).style.display = 'block';
            document.getElementById(`edit-box-${id}`).style.display = 'none';
        }

        function saveEdit(id) {
            const record = appState.data.find(d => d.id === id);
            if (!record) return;

            const newVal = document.getElementById(`edit-input-${id}`).value.trim();
            if (!newVal) return;

            record.rawText = newVal;
            record.synced = false; // 再送信対象にする
            saveData();

            // UIを戻してから自動再送信
            cancelEdit(id);
            if (navigator.onLine && config.gasUrl) {
                sendToCloud(record).then(() => updateUI());
            }
        }
    </script>
</body>

</html>
